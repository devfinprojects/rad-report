name = "radreport-ai"
main = "src/index.js"
compatibility_date = "2024-01-01"
node_compat = true
account_id = "28e2ed35cf5a283715c062ec7de7ffdb"

[env.production]
name = "radreport-ai-prod"

[env.staging]
name = "radreport-ai-staging"

[[kv_namespaces]]
binding = "TEMPLATES"
id = "45cee1f844864b869632bfd4ccd33836"
preview_id = "preview_templates"

[[kv_namespaces]]
binding = "SNIPPETS"
id = "7cdd4de8c67d4242bb16ddd67b087dca"
preview_id = "preview_snippets"

[[kv_namespaces]]
binding = "REPORTS"
id = "b160732d8b6641d9993116df3c18a80d"
preview_id = "preview_reports"

[[kv_namespaces]]
binding = "SESSIONS"
id = "8102fc4ccaaf4d79bcd3ba1a39ca2299"
preview_id = "preview_sessions"

[[kv_namespaces]]
binding = "USAGE"
id = "5a9a3a7709e640cda4a697d5f51b8103"
preview_id = "preview_usage"

[vars]
ENVIRONMENT = "development"
API_VERSION = "1.0.0"
MAX_TEMPLATE_SIZE = 50000
MAX_SNIPPET_SIZE = 10000
DEFAULT_MODALITY = "CT"
DEFAULT_SYSTEM = " BODY"
ENABLE_STREAMING = "true"
ENABLE_DEBUG = "false"
RATE_LIMIT_REQUESTS = "100"
RATE_LIMIT_WINDOW = "60"

[build]
command = "npm run build"

[build.tests]
command = "npm run test"

[observability]
enabled = true